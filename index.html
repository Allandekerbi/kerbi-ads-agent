<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kerbi Ads Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
    header { background: #fff; border-bottom: 0.5px solid #e0e0e0; padding: 16px 32px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 18px; font-weight: 500; }
    .logo-box { width: 36px; height: 36px; background: #1a2d5a; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .logo-box img { width: 28px; filter: brightness(10); }
    .badge { font-size: 11px; background: #fff3ee; color: #cc4a1a; border-radius: 4px; padding: 2px 8px; font-weight: 500; }
    main { max-width: 1100px; margin: 0 auto; padding: 28px 24px; display: grid; gap: 18px; }
    .card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 20px; }
    .card h2 { font-size: 14px; font-weight: 500; margin-bottom: 14px; color: #555; text-transform: uppercase; letter-spacing: 0.3px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .section-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 500; }
    input[type="password"] { width: 100%; border: 0.5px solid #e0e0e0; border-radius: 7px; padding: 9px 11px; font-size: 13px; font-family: inherit; color: #1a1a1a; background: #fff; }
    input:focus { outline: none; border-color: #ff6b2b; }
    .api-hint { font-size: 11px; color: #aaa; margin-top: 4px; }
    .sel-btn { border: 0.5px solid #e0e0e0; border-radius: 8px; padding: 10px 12px; cursor: pointer; background: #fff; text-align: left; transition: all 0.12s; width: 100%; }
    .sel-btn:hover { border-color: #ff6b2b; background: #fff8f5; }
    .sel-btn.on { border-color: #ff6b2b; background: #fff3ee; }
    .sel-btn .n { font-size: 13px; font-weight: 500; }
    .sel-btn .d { font-size: 11px; color: #888; margin-top: 1px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; margin-bottom: 6px; }
    textarea { width: 100%; border: 0.5px solid #e0e0e0; border-radius: 7px; padding: 10px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 80px; color: #1a1a1a; }
    textarea:focus { outline: none; border-color: #ff6b2b; }
    .upload-zone { border: 1.5px dashed #e0e0e0; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; position: relative; transition: all 0.12s; }
    .upload-zone:hover { border-color: #ff6b2b; background: #fff8f5; }
    .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-zone p { font-size: 13px; color: #888; }
    .upload-zone strong { color: #ff6b2b; }
    .preview-img { width: 100%; max-height: 160px; object-fit: contain; border-radius: 6px; margin-top: 10px; border: 0.5px solid #e0e0e0; }
    .nb-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
    .nb-row input[type="range"] { flex: 1; accent-color: #ff6b2b; }
    .nb-val { font-size: 15px; font-weight: 500; color: #ff6b2b; min-width: 24px; }
    .generate-btn { width: 100%; background: #ff6b2b; color: white; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.12s; }
    .generate-btn:hover { background: #e55a1f; }
    .generate-btn:disabled { background: #ccc; cursor: not-allowed; }
    .spinner { display: inline-block; width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .results-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .creative-card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; overflow: hidden; }
    .creative-top { padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
    .creative-top span { color: white; font-size: 12px; font-weight: 500; }
    .copy-btn { background: rgba(255,255,255,0.2); color: white; border: 0.5px solid rgba(255,255,255,0.3); border-radius: 5px; padding: 3px 8px; font-size: 11px; cursor: pointer; }
    .creative-body { padding: 14px; }
    .canvas-wrap { background: #f9f9f7; border-radius: 8px; overflow: hidden; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; min-height: 160px; }
    canvas { max-width: 100%; border-radius: 4px; display: block; }
    .img-loading { font-size: 12px; color: #aaa; text-align: center; padding: 20px; }
    .img-spinner { display: block; width: 22px; height: 22px; border: 2px solid #e0e0e0; border-top-color: #ff6b2b; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 8px; }
    .field { margin-bottom: 9px; }
    .fl { font-size: 10px; color: #bbb; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; font-weight: 500; }
    .fv { font-size: 13px; color: #1a1a1a; line-height: 1.4; }
    .hook-v { font-size: 14px; font-weight: 500; color: #ff6b2b; }
    .tag { display: inline-block; background: #fff3ee; color: #cc4a1a; border-radius: 4px; padding: 1px 7px; font-size: 11px; margin-right: 3px; margin-bottom: 3px; }
    .dl-btn { width: 100%; background: #f5f5f3; border: 0.5px solid #e0e0e0; border-radius: 7px; padding: 7px; font-size: 12px; cursor: pointer; margin-top: 8px; color: #555; }
    .dl-btn:hover { background: #ebebeb; }
    .results-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .results-hdr h3 { font-size: 15px; font-weight: 500; }
  </style>
</head>

  <h1>Kerbi Ads Agent</h1>
  <span class="badge">Briefs + Visuels IA</span>
</header>

<main>

  <div class="card">
    <h2>Clés API</h2>
    <div class="grid2">
      <div>
        <div class="section-label">Clé Claude</div>
        <input type="password" id="claudeKey" placeholder="sk-ant-..." />
        <p class="api-hint">console.anthropic.com → API Keys</p>
      </div>
      <div>
        <div class="section-label">Clé Fal.ai</div>
        <input type="password" id="falKey" placeholder="fal-..." />
        <p class="api-hint">fal.ai → Settings → API Keys</p>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Gamme produit</h2>
    <div class="grid3">
      <button class="sel-btn on" data-g="hydra-glow" onclick="sg(this)">
        <div class="dot" style="background:#e8475f"></div>
        <div class="n">Hydra Glow</div>
        <div class="d">SPF + Glow · 20-40 ans</div>
      </button>
      <button class="sel-btn" data-g="hydratante" onclick="sg(this)">
        <div class="dot" style="background:#2eafd4"></div>
        <div class="n">Hydratante</div>
        <div class="d">BIO · Peaux sensibles</div>
      </button>
      <button class="sel-btn" data-g="minerale" onclick="sg(this)">
        <div class="dot" style="background:#f5a623"></div>
        <div class="n">Minérale</div>
        <div class="d">Famille · Dès 6 mois</div>
      </button>
    </div>
  </div>

  <div class="grid2">
    <div class="card">
      <h2>Format Meta</h2>
      <div class="grid3">
        <button class="sel-btn on" data-f="feed" onclick="sf(this)">
          <div style="font-size:16px;margin-bottom:3px">▪</div>
          <div class="n" style="font-size:12px">Feed 1:1</div>
        </button>
        <button class="sel-btn" data-f="story" onclick="sf(this)">
          <div style="font-size:16px;margin-bottom:3px">▬</div>
          <div class="n" style="font-size:12px">Story 9:16</div>
        </button>
        <button class="sel-btn" data-f="banner" onclick="sf(this)">
          <div style="font-size:16px;margin-bottom:3px">▭</div>
          <div class="n" style="font-size:12px">Banner</div>
        </button>
      </div>
    </div>
    <div class="card">
      <h2>Objectif</h2>
      <div class="grid2">
        <button class="sel-btn on" data-o="notoriete" onclick="so(this)">Notoriété</button>
        <button class="sel-btn" data-o="conversion" onclick="so(this)">Conversion</button>
        <button class="sel-btn" data-o="trafic" onclick="so(this)">Trafic</button>
        <button class="sel-btn" data-o="engagement" onclick="so(this)">Engagement</button>
      </div>
    </div>
  </div>

  <div class="grid2">
    <div class="card">
      <h2>Photo produit (PNG)</h2>
      <div class="upload-zone">
        <input type="file" accept="image/*" id="productImg" onchange="handleUpload(event)" />
        <div id="upIcon" style="font-size:24px;opacity:0.35;margin-bottom:6px">+</div>
        <p id="upTxt">Glisse ton PNG produit ici<br><strong>ou clique pour choisir</strong></p>
      </div>
      <img id="imgPreview" class="preview-img" style="display:none" />
    </div>
    <div class="card">
      <h2>Brief créatif</h2>
      <textarea id="brief" placeholder="Style souhaité... Ex: fond blanc épuré, produit à gauche, titre en gras à droite, ton minimaliste Respire..."></textarea>
      <div class="nb-row">
        <span style="font-size:12px;color:#888">Nombre</span>
        <input type="range" min="2" max="10" value="4" step="1" id="nbC" oninput="document.getElementById('nbV').textContent=this.value" />
        <span class="nb-val" id="nbV">4</span>
      </div>
    </div>
  </div>

  <button class="generate-btn" id="genBtn" onclick="generate()">Générer les creatives Kerbi</button>

  <div id="resultsWrap" style="display:none">
    <div class="results-hdr">
      <h3 id="resTitle">Creatives générées</h3>
    </div>
    <div class="results-grid" id="results"></div>
  </div>

</main>

let state = { g: "hydra-glow", f: "feed", o: "notoriete" };
let productImgEl = null;

function sg(el) { document.querySelectorAll("[data-g]").forEach(b=>b.classList.remove("on")); el.classList.add("on"); state.g=el.dataset.g; }
function sf(el) { document.querySelectorAll("[data-f]").forEach(b=>b.classList.remove("on")); el.classList.add("on"); state.f=el.dataset.f; }
function so(el) { document.querySelectorAll("[data-o]").forEach(b=>b.classList.remove("on")); el.classList.add("on"); state.o=el.dataset.o; }

function handleUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => { productImgEl = img; };
    img.src = ev.target.result;
    document.getElementById("imgPreview").src = ev.target.result;
    document.getElementById("imgPreview").style.display = "block";
    document.getElementById("upIcon").style.display = "none";
    document.getElementById("upTxt").style.display = "none";
  };
  reader.readAsDataURL(file);
}

  "minerale": { label:"Minérale", color:"#f5a623", accent:"#f5a623", bg:"#fffbf0",
    desc:"Famille haute tolérance dès 6 mois. 100% filtre minéral, sans perturbateurs endocriniens, BIO.",
    tone:"Rassurant, familial, sécurisant, naturel" }
};
const formats = { feed:"Carré 1:1 (1080x1080px)", story:"Vertical 9:16 (1080x1920px)", banner:"Horizontal 1.91:1 (1200x628px)" };
const objectifs = { notoriete:"Notoriété — émouvoir, faire connaître Kerbi", conversion:"Conversion — achat immédiat, CTA fort", trafic:"Trafic — cliquer vers le site", engagement:"Engagement — commentaires, partages" };
const falSizes = { feed:"square_hd", story:"portrait_4_3", banner:"landscape_4_3" };
const canvasSizes = { feed:[600,600], story:[338,600], banner:[600,314] };

async function generate() {
  const claudeKey = document.getElementById("claudeKey").value.trim();
  const falKey = document.getElementById("falKey").value.trim();
  const brief = document.getElementById("brief").value.trim();
  const nb = parseInt(document.getElementById("nbC").value);
  if (!claudeKey) { alert("Entre ta clé Claude."); return; }

  const btn = document.getElementById("genBtn");
  btn.disabled = true; btn.innerHTML = "<span class=\"spinner\"></span> Claude génère les briefs...";

  const g = gammes[state.g];
  const prompt = `Tu es expert Meta Ads beauté clean. Tu travailles pour Kerbi, 1er Laboratoire Dermo-Solaire naturel, né en Bretagne.
GAMME: ${g.label} — ${g.desc}
TON: ${g.tone}
FORMAT: ${formats[state.f]}
OBJECTIF: ${objectifs[state.o]}
${brief ? "STYLE: "+brief : "Style minimaliste clean beauty, inspiré des meilleures marques françaises."}

Génère ${nb} briefs créatifs variés. Réponds UNIQUEMENT avec un JSON valide, sans markdown:
[{"n":1,"angle":"3-4 mots","accroche":"max 6 mots percutants","body":"1 phrase bénéfice clé","cta":"max 3 mots","visuel":"english prompt for AI image: scene, lighting, mood, background, product placement","emotion":"1 mot","tags":["#tag1","#tag2","#tag3"]}]`;

  let creatives = [];
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":claudeKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:3000,messages:[{role:"user",content:prompt}]})
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const clean = data.content[0].text.replace(/```json|```/g,"").trim();
    creatives = JSON.parse(clean);
  } catch(err) { alert("Erreur Claude: "+err.message); btn.disabled=false; btn.innerHTML="Générer les creatives Kerbi"; return; }

  renderCards(creatives, g);

  if (falKey) {
    btn.innerHTML = "<span class=\"spinner\"></span> Fal.ai génère les visuels...";
    for (const c of creatives) generateVisual(c, falKey, g);
  } else {
    document.querySelectorAll(".canvas-wrap").forEach(el => {
      el.innerHTML = "<div class=\"img-loading\">Clé Fal.ai manquante — visuel non généré</div>";
    });
  }

  btn.disabled=false; btn.innerHTML="Générer les creatives Kerbi";
}

function renderCards(creatives, g) {
  const wrap = document.getElementById("resultsWrap");
  const grid = document.getElementById("results");
  document.getElementById("resTitle").textContent = creatives.length + " creatives — " + g.label;
  wrap.style.display = "block";
  grid.innerHTML = creatives.map(c => `
    <div class="creative-card">
      <div class="creative-top" style="background:${g.color}">
        <span>#${c.n} — ${c.angle}</span>
        <button class="copy-btn" onclick="copyC(${c.n})">Copier</button>
      </div>
      <div class="creative-body">
        <div class="canvas-wrap" id="cw-${c.n}">
          <div class="img-loading"><div class="img-spinner"></div>Génération visuel...</div>
        </div>
        <div class="field"><div class="fl">Accroche</div><div class="fv hook-v">${c.accroche}</div></div>
        <div class="field"><div class="fl">Corps</div><div class="fv">${c.body}</div></div>
        <div class="field"><div class="fl">CTA</div><div class="fv" style="font-weight:500">→ ${c.cta}</div></div>
        <div class="field"><div class="fl">Émotion</div><div class="fv">${c.emotion}</div></div>
        <div class="field">${c.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
      </div>
    </div>`).join("");
  window._cr = creatives;
  window._g = g;
  wrap.scrollIntoView({behavior:"smooth"});
}

async function generateVisual(c, falKey, g) {
  const cw = document.getElementById("cw-"+c.n);
  let imgPrompt = c.visuel + ", pure white background, clean studio product photography, minimalist, professional cosmetics ad, high quality, sharp";

  try {
    const body = { prompt: imgPrompt, image_size: falSizes[state.f] || "square_hd", num_inference_steps: 28, guidance_scale: 3.5, num_images: 1, enable_safety_checker: true };
    if (productImgEl) { body.image_url = productImgEl.src; body.strength = 0.65; }
    const endpoint = productImgEl ? "https://fal.run/fal-ai/flux/dev/image-to-image" : "https://fal.run/fal-ai/flux/dev";
    const res = await fetch(endpoint, { method:"POST", headers:{"Content-Type":"application/json","Authorization":"Key "+falKey}, body:JSON.stringify(body) });
    const data = await res.json();
    if (data.images && data.images[0]) {
      const bgImg = new Image(); bgImg.crossOrigin = "anonymous";
      bgImg.onload = () => composeCanvas(c, g, bgImg, cw);
      bgImg.onerror = () => composeCanvas(c, g, null, cw);
      bgImg.src = data.images[0].url;
      const found = window._cr.find(x=>x.n===c.n);
      if (found) found._imgUrl = data.images[0].url;
    } else {
      composeCanvas(c, g, null, cw);
    }
  } catch(err) {
    composeCanvas(c, g, null, cw);
  }
}

function composeCanvas(c, g, bgImg, container) {
  const [W, H] = canvasSizes[state.f] || [600, 600];
  const canvas = document.createElement("canvas");
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");

  // Fond blanc
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, W, H);

  // Image de fond générée par Fal.ai
  if (bgImg) {
    const scale = Math.max(W/bgImg.width, H/bgImg.height);
    const bw = bgImg.width*scale, bh = bgImg.height*scale;
    const bx = (W-bw)/2, by = (H-bh)/2;
    ctx.drawImage(bgImg, bx, by, bw, bh);
  }

  // Overlay semi-transparent blanc en bas pour le texte
  const overlayH = Math.round(H * 0.42);
  const grad = ctx.createLinearGradient(0, H-overlayH-40, 0, H);
  grad.addColorStop(0, "rgba(255,255,255,0)");
  grad.addColorStop(0.3, "rgba(255,255,255,0.88)");
  grad.addColorStop(1, "rgba(255,255,255,0.97)");
  ctx.fillStyle = grad;
  ctx.fillRect(0, H-overlayH-40, W, overlayH+40);

  const pad = Math.round(W * 0.06);
  const textStartY = H - overlayH + 10;

  // Logo Kerbi en haut
  const logoImg = new Image();
  logoImg.onload = () => {
    const logoW = Math.round(W * 0.28);
    const logoH = Math.round(logoW * (logoImg.height/logoImg.width));
    ctx.drawImage(logoImg, pad, Math.round(H*0.04), logoW, logoH);
    drawText();
  };
  logoImg.onerror = drawText;
  logoImg.src = LOGO_SRC;

  function drawText() {
    const fs = W < 400 ? 0.85 : 1;

    // Bande de couleur gamme (fine ligne décorative)
    ctx.fillStyle = g.color;
    ctx.fillRect(pad, textStartY + 2, Math.round(W*0.06), 3);

    // Accroche principale
    ctx.fillStyle = "#1a1a1a";
    ctx.font = `bold ${Math.round(22*fs)}px system-ui, sans-serif`;
    ctx.textBaseline = "top";
    wrapText(ctx, c.accroche, pad, textStartY + 18, W - pad*2, Math.round(28*fs));

    // Corps texte
    const accrLines = Math.ceil(ctx.measureText(c.accroche).width / (W - pad*2)) + 1;
    const bodyY = textStartY + 18 + accrLines * Math.round(28*fs) + 8;
    ctx.fillStyle = "#555";
    ctx.font = `${Math.round(13*fs)}px system-ui, sans-serif`;
    wrapText(ctx, c.body, pad, bodyY, W - pad*2, Math.round(18*fs));

    // Bouton CTA
    const ctaY = H - Math.round(H*0.12);
    const ctaText = c.cta;
    ctx.font = `bold ${Math.round(13*fs)}px system-ui, sans-serif`;
    const ctaW = ctx.measureText(ctaText).width + 32;
    const ctaH2 = Math.round(34*fs);
    roundRect(ctx, pad, ctaY - ctaH2/2, ctaW, ctaH2, 6);
    ctx.fillStyle = g.color;
    ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.textBaseline = "middle";
    ctx.fillText(ctaText, pad + 16, ctaY);

    container.innerHTML = "";
    container.appendChild(canvas);

    // Bouton télécharger
    const dlBtn = document.createElement("button");
    dlBtn.className = "dl-btn";
    dlBtn.textContent = "Télécharger la creative";
    dlBtn.onclick = () => { const a=document.createElement("a"); a.href=canvas.toDataURL("image/jpeg",0.92); a.download="kerbi-creative-"+c.n+".jpg"; a.click(); };
    container.parentElement.querySelector(".creative-body").appendChild(dlBtn);
  }
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  const words = text.split(" ");
  let line = "";
  for (const word of words) {
    const test = line + (line ? " " : "") + word;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, y);
      y += lineH; line = word;
    } else { line = test; }
  }
  if (line) ctx.fillText(line, x, y);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function copyC(n) {
  const c = window._cr.find(x=>x.n===n); if (!c) return;
  const t = `CREATIVE #${c.n} — ${c.angle}\n\nACCROCHE: ${c.accroche}\nCORPS: ${c.body}\nCTA: ${c.cta}\nVISUEL: ${c.visuel}\nÉMOTION: ${c.emotion}\nHASHTAGS: ${c.tags.join(" ")}`;
  navigator.clipboard.writeText(t).then(()=>alert("Creative #"+n+" copiée !"));
}
</script>
