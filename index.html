<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kerbi Ads Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }

    header { background: #fff; border-bottom: 0.5px solid #e0e0e0; padding: 16px 32px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 18px; font-weight: 500; letter-spacing: -0.3px; }
    .logo { width: 32px; height: 32px; background: #ff6b2b; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 14px; }

    main { max-width: 900px; margin: 0 auto; padding: 32px 24px; display: grid; gap: 24px; }

    .card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 24px; }
    .card h2 { font-size: 15px; font-weight: 500; margin-bottom: 16px; color: #1a1a1a; }

    .section-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 500; }

    .gamme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .gamme-btn { border: 0.5px solid #e0e0e0; border-radius: 8px; padding: 12px; cursor: pointer; background: #fff; text-align: left; transition: all 0.15s; }
    .gamme-btn:hover { border-color: #ff6b2b; background: #fff8f5; }
    .gamme-btn.selected { border-color: #ff6b2b; background: #fff3ee; }
    .gamme-btn .gamme-name { font-size: 13px; font-weight: 500; color: #1a1a1a; }
    .gamme-btn .gamme-desc { font-size: 11px; color: #888; margin-top: 2px; }
    .gamme-dot { width: 8px; height: 8px; border-radius: 50%; margin-bottom: 8px; }

    .format-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .format-btn { border: 0.5px solid #e0e0e0; border-radius: 8px; padding: 12px; cursor: pointer; background: #fff; text-align: center; transition: all 0.15s; }
    .format-btn:hover { border-color: #ff6b2b; background: #fff8f5; }
    .format-btn.selected { border-color: #ff6b2b; background: #fff3ee; }
    .format-icon { font-size: 20px; margin-bottom: 4px; }
    .format-name { font-size: 12px; font-weight: 500; }
    .format-ratio { font-size: 11px; color: #888; }

    .objectif-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .objectif-btn { border: 0.5px solid #e0e0e0; border-radius: 8px; padding: 10px 14px; cursor: pointer; background: #fff; text-align: left; font-size: 13px; transition: all 0.15s; }
    .objectif-btn:hover { border-color: #ff6b2b; background: #fff8f5; }
    .objectif-btn.selected { border-color: #ff6b2b; background: #fff3ee; color: #cc4a1a; font-weight: 500; }

    textarea { width: 100%; border: 0.5px solid #e0e0e0; border-radius: 8px; padding: 12px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 100px; color: #1a1a1a; background: #fff; }
    textarea:focus { outline: none; border-color: #ff6b2b; }

    input[type="text"], input[type="password"] { width: 100%; border: 0.5px solid #e0e0e0; border-radius: 8px; padding: 10px 12px; font-size: 13px; font-family: inherit; color: #1a1a1a; background: #fff; }
    input:focus { outline: none; border-color: #ff6b2b; }

    .nb-input { display: flex; align-items: center; gap: 12px; }
    .nb-input input[type="range"] { flex: 1; accent-color: #ff6b2b; }
    .nb-val { font-size: 15px; font-weight: 500; min-width: 32px; color: #ff6b2b; }

    .generate-btn { width: 100%; background: #ff6b2b; color: white; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
    .generate-btn:hover { background: #e55a1f; }
    .generate-btn:disabled { background: #ccc; cursor: not-allowed; }

    .results { display: grid; gap: 16px; }
    .creative-card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; overflow: hidden; }
    .creative-header { background: #ff6b2b; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; }
    .creative-header span { color: white; font-size: 13px; font-weight: 500; }
    .creative-body { padding: 16px; }
    .creative-section { margin-bottom: 14px; }
    .creative-section:last-child { margin-bottom: 0; }
    .creative-section-title { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 500; }
    .creative-section-content { font-size: 14px; color: #1a1a1a; line-height: 1.5; }
    .hook { font-size: 16px; font-weight: 500; color: #ff6b2b; line-height: 1.4; }
    .copy-btn { background: #f5f5f3; border: 0.5px solid #e0e0e0; border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; color: #555; }
    .copy-btn:hover { background: #ebebeb; }

    .loading { text-align: center; padding: 40px; color: #888; font-size: 14px; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #e0e0e0; border-top-color: #ff6b2b; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .api-hint { font-size: 11px; color: #aaa; margin-top: 6px; }
    .tag { display: inline-block; background: #fff3ee; color: #cc4a1a; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 500; margin-right: 4px; margin-bottom: 4px; }
    .empty-state { text-align: center; padding: 48px 24px; color: #aaa; font-size: 14px; }
    .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
  </style>
</head>
<body>

<header>
  <div class="logo">K</div>
  <h1>Kerbi Ads Agent</h1>
</header>

<main>

  <!-- Config API -->
  <div class="card">
    <h2>Configuration</h2>
    <div class="section-label">Clé API Claude</div>
    <input type="password" id="apiKey" placeholder="sk-ant-..." />
    <p class="api-hint">Ta clé n'est jamais envoyée ailleurs que directement à l'API Anthropic.</p>
  </div>

  <!-- Gamme -->
  <div class="card">
    <h2>Gamme produit</h2>
    <div class="gamme-grid">
      <button class="gamme-btn selected" data-gamme="hydra-glow" onclick="selectGamme(this)">
        <div class="gamme-dot" style="background:#e8475f"></div>
        <div class="gamme-name">Hydra Glow</div>
        <div class="gamme-desc">SPF + Soin + Glow · Cible 20-40 ans</div>
      </button>
      <button class="gamme-btn" data-gamme="hydratante" onclick="selectGamme(this)">
        <div class="gamme-dot" style="background:#2eafd4"></div>
        <div class="gamme-name">Hydratante</div>
        <div class="gamme-desc">2-en-1 BIO · Peaux sensibles</div>
      </button>
      <button class="gamme-btn" data-gamme="minerale" onclick="selectGamme(this)">
        <div class="gamme-dot" style="background:#f5a623"></div>
        <div class="gamme-name">Minérale</div>
        <div class="gamme-desc">Famille · Dès 6 mois</div>
      </button>
    </div>
  </div>

  <!-- Format -->
  <div class="card">
    <h2>Format Meta</h2>
    <div class="format-grid">
      <button class="format-btn selected" data-format="feed" onclick="selectFormat(this)">
        <div class="format-icon">▪</div>
        <div class="format-name">Feed</div>
        <div class="format-ratio">1:1 · 1080×1080</div>
      </button>
      <button class="format-btn" data-format="story" onclick="selectFormat(this)">
        <div class="format-icon">▬</div>
        <div class="format-name">Story / Reels</div>
        <div class="format-ratio">9:16 · 1080×1920</div>
      </button>
      <button class="format-btn" data-format="banner" onclick="selectFormat(this)">
        <div class="format-icon">▭</div>
        <div class="format-name">Banner</div>
        <div class="format-ratio">1.91:1 · 1200×628</div>
      </button>
    </div>
  </div>

  <!-- Objectif -->
  <div class="card">
    <h2>Objectif de la campagne</h2>
    <div class="objectif-grid">
      <button class="objectif-btn selected" data-obj="notoriete" onclick="selectObjectif(this)">Notoriété de marque</button>
      <button class="objectif-btn" data-obj="conversion" onclick="selectObjectif(this)">Conversion / Achat</button>
      <button class="objectif-btn" data-obj="trafic" onclick="selectObjectif(this)">Trafic site web</button>
      <button class="objectif-btn" data-obj="engagement" onclick="selectObjectif(this)">Engagement</button>
    </div>
  </div>

  <!-- Contexte / Références -->
  <div class="card">
    <h2>Brief créatif</h2>
    <div class="section-label" style="margin-bottom:8px">Décris le style des concurrents ou colle tes références</div>
    <textarea id="brief" placeholder="Ex: Les pubs Respire qui cartonnent utilisent un fond blanc épuré, une photo produit centrée en gros plan, une accroche courte en haut (max 5 mots), un sous-titre bénéfice produit, et un CTA simple. Ton minimaliste, proximité, pas trop corporate..."></textarea>

    <div style="margin-top:16px">
      <div class="section-label">Nombre de creatives à générer</div>
      <div class="nb-input">
        <input type="range" min="3" max="20" value="10" id="nbCreatives" oninput="document.getElementById('nbVal').textContent=this.value" />
        <span class="nb-val" id="nbVal">10</span>
      </div>
    </div>
  </div>

  <!-- Bouton -->
  <button class="generate-btn" id="generateBtn" onclick="generate()">
    Générer les briefs créatifs
  </button>

  <!-- Résultats -->
  <div id="results"></div>

</main>

<script>
  let selectedGamme = 'hydra-glow';
  let selectedFormat = 'feed';
  let selectedObjectif = 'notoriete';

  function selectGamme(el) {
    document.querySelectorAll('.gamme-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    selectedGamme = el.dataset.gamme;
  }

  function selectFormat(el) {
    document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    selectedFormat = el.dataset.format;
  }

  function selectObjectif(el) {
    document.querySelectorAll('.objectif-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    selectedObjectif = el.dataset.obj;
  }

  const gammeInfo = {
    'hydra-glow': {
      label: 'Hydra Glow',
      desc: 'Gamme phare Kerbi. SPF 50/50+, effet glow avec micropaillettes 100% naturelles, acide hyaluronique + niacinamide. Cible : femmes 20-40 ans, adeptes clean beauty & skinimalisme. Produits : Fluide solaire SPF50 (19,90€), Spray SPF50+ (19,90€), Stick SPF50+ (14,50€), Baume lèvres SPF50+ (11,90€). Technologie exclusive DermaGlow Fusion®. 100/100 Yuka.',
      tone: 'Fun, glowy, instagrammable, clean & safe, sensoriel'
    },
    'hydratante': {
      label: 'Hydratante',
      desc: 'Gamme BIO certifiée. Crème de jour SPF50 et SPF30, Sérum hydratant, Lait corps. 100% naturelle, formule minérale douce. Cible : adultes 25-50 ans, peaux sensibles, consommateurs bio made in France. Prix : 23,90€ (crème), 13,90€ (sérum), 12,50€ (lait). Technologie DermoMineral Defense®.',
      tone: 'Doux, rassurant, naturel, quotidien, simplifie la routine'
    },
    'minerale': {
      label: 'Minérale',
      desc: 'Gamme famille haute tolérance. Lait solaire SPF50 dès 6 mois (sans parfum) et dès 3 ans (parfum monoï). Stick solaire. 100% filtre minéral, sans perturbateurs endocriniens. Certifié BIO. Prix : 23,90€ (100g), 18,90€ (50g), 28,90€ (150g). Cible : parents, bébés, peaux sensibles.',
      tone: 'Rassurant, familial, sécurisant, naturel, expert'
    }
  };

  const formatInfo = {
    'feed': 'Format carré 1:1 (1080×1080px) pour le Feed Instagram/Facebook',
    'story': 'Format vertical 9:16 (1080×1920px) pour Stories et Reels',
    'banner': 'Format horizontal 1.91:1 (1200×628px) pour bannières et Facebook Feed desktop'
  };

  const objectifInfo = {
    'notoriete': 'Notoriété de marque — faire connaître Kerbi, créer de l\'émotion',
    'conversion': 'Conversion / Achat — pousser à l\'achat immédiat, CTA fort',
    'trafic': 'Trafic site web — inciter à cliquer et découvrir',
    'engagement': 'Engagement — générer des commentaires, partages, interactions'
  };

  async function generate() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const brief = document.getElementById('brief').value.trim();
    const nb = parseInt(document.getElementById('nbCreatives').value);

    if (!apiKey) { alert('Entre ta clé API Claude pour commencer.'); return; }

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Génération en cours...';

    const resultsEl = document.getElementById('results');
    resultsEl.innerHTML = '<div class="loading"><span class="spinner"></span> Claude analyse et génère tes briefs créatifs...</div>';

    const gamme = gammeInfo[selectedGamme];

    const prompt = `Tu es un expert en publicité digitale spécialisé dans la beauté et le skincare. Tu travailles pour Kerbi, le 1er Laboratoire Dermo-Solaire naturel à impact, né en Bretagne.

GAMME : ${gamme.label}
INFOS PRODUIT : ${gamme.desc}
TON DE LA GAMME : ${gamme.tone}
FORMAT : ${formatInfo[selectedFormat]}
OBJECTIF CAMPAGNE : ${objectifInfo[selectedObjectif]}

${brief ? `RÉFÉRENCES / STYLE SOUHAITÉ : ${brief}` : 'Inspire-toi des meilleures publicités de la beauté clean et naturelle.'}

Génère exactement ${nb} briefs créatifs DIFFÉRENTS et VARIÉS pour des publicités Meta (Facebook/Instagram).

Pour chaque creative, fournis un JSON avec exactement ces champs :
- "numero": numéro de 1 à ${nb}
- "angle": l'angle créatif en 3-4 mots (ex: "Avant/Après peau", "Démonstration texture", "Témoignage client")
- "accroche": la phrase d'accroche principale (max 7 mots, percutante, adaptée à l'objectif)
- "sous_titre": le texte secondaire (1-2 phrases, bénéfice produit ou preuve sociale)
- "cta": le bouton d'appel à l'action (max 4 mots)
- "visuel": description précise du visuel à créer (composition, arrière-plan, mise en scène produit, ambiance)
- "emotion": l'émotion principale que doit ressentir le spectateur
- "hashtags": 3 hashtags pertinents

Réponds UNIQUEMENT avec un tableau JSON valide, sans texte avant ou après, sans markdown. Format exact :
[{"numero":1,"angle":"...","accroche":"...","sous_titre":"...","cta":"...","visuel":"...","emotion":"...","hashtags":["#...","#...","#..."]}]`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 4000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await response.json();

      if (data.error) {
        resultsEl.innerHTML = `<div class="card" style="border-color:#f09595;color:#a32d2d;padding:20px;">Erreur API : ${data.error.message}</div>`;
        return;
      }

      const text = data.content[0].text.trim();
      const clean = text.replace(/```json|```/g, '').trim();
      const creatives = JSON.parse(clean);

      renderResults(creatives, gamme.label);

    } catch (err) {
      resultsEl.innerHTML = `<div class="card" style="border-color:#f09595;color:#a32d2d;padding:20px;">Erreur : ${err.message}. Vérifie ta clé API.</div>`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Générer les briefs créatifs';
    }
  }

  function renderResults(creatives, gammeLabel) {
    const resultsEl = document.getElementById('results');
    const formatLabel = { feed: 'Feed 1:1', story: 'Story 9:16', banner: 'Banner 1.91:1' }[selectedFormat];

    let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <div style="font-size:15px;font-weight:500;">${creatives.length} briefs générés</div>
      <div style="display:flex;gap:6px;">
        <span class="tag">${gammeLabel}</span>
        <span class="tag">${formatLabel}</span>
      </div>
    </div>`;

    html += '<div class="results">';
    creatives.forEach(c => {
      html += `
      <div class="creative-card">
        <div class="creative-header">
          <span>Creative #${c.numero} — ${c.angle}</span>
          <button class="copy-btn" style="background:rgba(255,255,255,0.2);color:white;border-color:rgba(255,255,255,0.3);" onclick="copyCreative(${c.numero})">Copier</button>
        </div>
        <div class="creative-body" id="creative-${c.numero}">
          <div class="creative-section">
            <div class="creative-section-title">Accroche principale</div>
            <div class="hook">${c.accroche}</div>
          </div>
          <div class="creative-section">
            <div class="creative-section-title">Sous-titre / Corps</div>
            <div class="creative-section-content">${c.sous_titre}</div>
          </div>
          <div class="creative-section">
            <div class="creative-section-title">CTA</div>
            <div class="creative-section-content" style="font-weight:500;">→ ${c.cta}</div>
          </div>
          <div class="creative-section">
            <div class="creative-section-title">Direction visuelle</div>
            <div class="creative-section-content" style="color:#555;font-style:italic;">${c.visuel}</div>
          </div>
          <div class="creative-section">
            <div class="creative-section-title">Émotion cible</div>
            <div class="creative-section-content">${c.emotion}</div>
          </div>
          <div class="creative-section">
            <div class="creative-section-title">Hashtags</div>
            <div>${c.hashtags.map(h => `<span class="tag">${h}</span>`).join('')}</div>
          </div>
        </div>
      </div>`;
    });
    html += '</div>';

    resultsEl.innerHTML = html;
    window._creatives = creatives;
  }

  function copyCreative(num) {
    const c = window._creatives.find(x => x.numero === num);
    if (!c) return;
    const text = `CREATIVE #${c.numero} — ${c.angle}\n\nACCROCHE: ${c.accroche}\nSOUS-TITRE: ${c.sous_titre}\nCTA: ${c.cta}\nVISUEL: ${c.visuel}\nÉMOTION: ${c.emotion}\nHASHTAGS: ${c.hashtags.join(' ')}`;
    navigator.clipboard.writeText(text);
    alert(`Creative #${num} copié !`);
  }
</script>

</body>
</html>
